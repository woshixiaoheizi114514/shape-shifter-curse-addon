site_name: SSCA Wiki - 幻形者诅咒扩展包百科
site_url: https://ssca-wiki.readthedocs.io/
site_description: 幻形者诅咒扩展包 (Shape Shifter's Curse Addon) 的非官方百科Wiki
site_author: 芒仔120

repo_url: https://github.com/MangZai-120/shape-shifter-curse-addon
repo_name: shape-shifter-curse-addon

theme:
  name: readthedocs
  locale: zh_CN

nav:
- 首页: index.md
- 新手上路:
  - 安装指南: getting_started/installation.md
- SP形态:
  - 形态概述: sp_forms/overview.md
  - SP使魔（灵界之主）: sp_forms/sp_familiar_fox.md
  - 红 · 堕落使魔（灵界之主分支）: sp_forms/sp_familiar_fox_red.md
  - 契灵（禁忌兵器）: sp_forms/sp_familiar_fox_mancianima.md
  - SP美西螈（深渊霸主）: sp_forms/sp_axolotl.md
  - SP野猫（暗夜猎手）: sp_forms/sp_wild_cat.md
  - SP雪狐（霜寒之灵）: sp_forms/sp_snow_fox.md
  - SP悦灵（水晶之音）: sp_forms/sp_allay.md
  - SP堕落悦灵（堕落之灵）: sp_forms/sp_fallen_allay.md
  - SP阿努比斯（冥裁者）: sp_forms/sp_anubis_wolf.md
  - 金沙岚 (尘卷风): sp_forms/sp_golden_sandstorm.md
- 物品:
  - 进化用品: items/evolution_items.md
  - 材料与素材: items/materials.md
  - 道具: items/tools.md
  - 饰品: items/trinkets.md
- 效果:
  - 增益效果: effects/buffs.md
  - 减益效果: effects/debuffs.md
- 指令: commands/commands.md
- 世界观与故事:
  - 📜 故事内容许可声明: lore/license.md
  - 背景设定: lore/background.md
  - 月光的诅咒: lore/moonlight_curse.md
  - 故事集 · 月痕：灵界之主: lore/story_collection.md
  - 丛林的幽灵: lore/jungle_ghost.md
  - 使魔研究记录: lore/familiar_research.md
  - 月髓环诗篇: lore/moon_ring_poems.md
  - 千年纪 · 人魔大战: lore/millennium_war.md
plugins:
  - search

markdown_extensions:
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - admonition
  - tables
  - attr_list

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MangZai-120/shape-shifter-curse-addon
